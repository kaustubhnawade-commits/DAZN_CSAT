<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Feedback Form</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
 
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #f5f5f5;
            padding: 20px;
        }
 
        .container {
            max-width: 400px;
            margin: 0 auto;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
 
        .header {
            background-color: #3d3d3d;
            color: white;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
 
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #cccccc;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
 
        .header-text h2 {
            font-size: 16px;
            color: #ffd700;
            margin-bottom: 2px;
        }
 
        .header-text p {
            font-size: 13px;
            color: #e0e0e0;
        }
 
        .content {
            padding: 30px 20px;
        }
 
        h1 {
            font-size: 20px;
            font-weight: 500;
            margin-bottom: 20px;
            color: #333;
        }
 
        .description {
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
        }
 
        .rating-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }
 
        .rating-option {
            display: flex;
            align-items: center;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            padding: 12px 15px;
            cursor: pointer;
            transition: all 0.2s;
            background-color: white;
        }
 
        .rating-option:hover:not(.disabled) {
            border-color: #1976d2;
            background-color: #f8f9fa;
        }
 
        .rating-option.selected {
            border-color: #1976d2;
            background-color: #1976d2;
            color: white;
        }
 
        .rating-option.disabled {
            cursor: not-allowed;
            opacity: 0.6;
        }
 
        .emoji {
            font-size: 28px;
            margin-right: 15px;
            min-width: 35px;
            text-align: center;
        }
 
        .rating-label {
            font-size: 15px;
            font-weight: 500;
        }
 
        .feedback-section {
            margin-bottom: 25px;
        }
 
        .feedback-label {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
            display: block;
        }
 
        textarea {
            width: 100%;
            min-height: 100px;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-family: inherit;
            font-size: 14px;
            resize: vertical;
            transition: border-color 0.2s;
        }
 
        textarea:focus {
            outline: none;
            border-color: #1976d2;
        }
 
        textarea:disabled {
            background-color: #f5f5f5;
            cursor: not-allowed;
        }
 
        .submit-btn {
            width: 100%;
            padding: 14px;
            background-color: #1976d2;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }
 
        .submit-btn:hover:not(:disabled) {
            background-color: #1565c0;
        }
 
        .submit-btn:disabled {
            background-color: #bdbdbd;
            cursor: not-allowed;
        }
 
        .success-message {
            display: none;
            background-color: #4caf50;
            color: white;
            padding: 12px;
            border-radius: 6px;
            margin-top: 15px;
            text-align: center;
            font-size: 14px;
        }
 
        .success-message.show {
            display: block;
        }
 
        .timestamp {
            text-align: center;
            color: #999;
            font-size: 12px;
            margin-top: 15px;
            padding-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="content">
            <h1>Share your feedback with us</h1>
            <p class="description">We would love your feedback on our service</p>
 
            <div class="rating-options">
                <div class="rating-option" data-rating="good">
                    <span class="emoji">😊</span>
                    <span class="rating-label">Good</span>
                </div>
                <div class="rating-option" data-rating="ok">
                    <span class="emoji">😐</span>
                    <span class="rating-label">Ok</span>
                </div>
                <div class="rating-option" data-rating="poor">
                    <span class="emoji">😞</span>
                    <span class="rating-label">Poor</span>
                </div>
            </div>
 
            <div class="feedback-section">
                <label class="feedback-label" for="feedbackText">What could we have done better?</label>
                <textarea id="feedbackText" placeholder=""></textarea>
            </div>
 
            <button class="submit-btn" id="submitBtn">Submit feedback</button>
 
            <div class="success-message" id="successMessage">
                Feedback submitted successfully!
            </div>
        </div>
    </div>
 
    <script>
        // Configuration - Yellow.ai API endpoint
        const API_ENDPOINT = 'https://r5.cloud.yellow.ai/integrations/sendevent/sendFeedbackToBot/x1750679463696';
        const API_AUTH_TOKEN = 'wfsN7V7wYBNEfRdepa_74SN6HNTMdt8i4VFh8X1n';
 
        // State management
        let selectedRating = null;
        let isSubmitted = false;
 
        // DOM elements
        const ratingOptions = document.querySelectorAll('.rating-option');
        const feedbackText = document.getElementById('feedbackText');
        const submitBtn = document.getElementById('submitBtn');
        const successMessage = document.getElementById('successMessage');
 
        // Helper function to get URL parameters
        function getUrlParameter(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }
 
        // Rating selection handler
        ratingOptions.forEach(option => {
            option.addEventListener('click', function() {
                if (isSubmitted) return;
 
                // Remove selected class from all options
                ratingOptions.forEach(opt => opt.classList.remove('selected'));
                
                // Add selected class to clicked option
                this.classList.add('selected');
                
                // Store selected rating
                selectedRating = this.dataset.rating;
            });
        });
 
        // Submit handler
        submitBtn.addEventListener('click', async function() {
            if (isSubmitted) return;
 
            // Validate that a rating is selected — silently do nothing if not
            if (!selectedRating) {
                console.warn('Submit attempted without a rating selected.');
                return;
            }
 
            // Get dynamic values from URL parameters or use defaults
            const sender = getUrlParameter('sender') || 'anonymous';
            const userLanguage = getUrlParameter('userLanguage') || 'en';
            const source = getUrlParameter('source') || 'feedback_form';
 
            // Prepare data to send to Yellow.ai API
            const feedbackData = {
                sender: sender,
                data: {
                    userLanguage: userLanguage,
                    rating: selectedRating,
                    comment: feedbackText.value.trim()
                }
            };
 
            try {
                // Disable form elements
                isSubmitted = true;
                submitBtn.disabled = true;
                submitBtn.textContent = 'Submitting...';
                feedbackText.disabled = true;
                ratingOptions.forEach(opt => opt.classList.add('disabled'));
 
                // Send data to Yellow.ai endpoint
                const response = await fetch(API_ENDPOINT + '?source=' + encodeURIComponent(source), {
                    method: 'POST',
                    headers: {
                        'x-api-key': API_AUTH_TOKEN,
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(feedbackData)
                });
 
                if (response.ok) {
                    // Show success message
                    successMessage.classList.add('show');
                    submitBtn.textContent = 'Submitted';
                    console.log('Feedback submitted successfully:', feedbackData);
                } else {
                    const errorText = await response.text();
                    throw new Error('Failed to submit feedback: ' + errorText);
                }
            } catch (error) {
                console.error('Error submitting feedback:', error);
                
                // Re-enable form on error
                isSubmitted = false;
                submitBtn.disabled = false;
                submitBtn.textContent = 'Submit feedback';
                feedbackText.disabled = false;
                ratingOptions.forEach(opt => opt.classList.remove('disabled'));
            }
        });
 
        // Optional: Prevent form resubmission on page refresh
        window.addEventListener('beforeunload', function(e) {
            if (!isSubmitted && (selectedRating || feedbackText.value.trim())) {
                e.preventDefault();
                e.returnValue = '';
            }
        });
    </script>
</body>
</html>
