<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feedback</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;
    background:#eef1f5;
    padding:10px;
}

.container{
    max-width:400px;
    margin:auto;
    background:#f3f4f6;
    border-radius:16px;
    padding:14px;
}

.card{
    background:#fff;
    border-radius:14px;
    padding:16px;
}

h1{
    font-size:18px;
    font-weight:700;
    color:#333;
}

.subtext{
    font-size:14px;
    color:#666;
    margin-top:4px;
    margin-bottom:12px;
}

.rating-options{
    display:flex;
    flex-direction:column;
    gap:10px;
}

.rating-option{
    display:flex;
    align-items:center;
    gap:10px;
    border:2px solid #dcdcdc;
    border-radius:12px;
    padding:12px;
    cursor:pointer;
    font-size:16px;
    font-weight:500;
    background:#fff;
}

.rating-option.selected{
    background:#2d73c5;
    color:#fff;
    border-color:#2d73c5;
}

.rating-option:not(.selected){
    border-color:#2d73c5;
}

.emoji{font-size:20px}

label{
    font-size:16px;
    font-weight:600;
    margin-top:14px;
    display:block;
    color:#333;
}

textarea{
    width:100%;
    height:60px;
    border-radius:10px;
    border:2px solid #2d73c5;
    padding:10px;
    font-size:14px;
    margin-top:6px;
    resize:none;
}

.submit-btn{
    width:100%;
    margin-top:14px;
    padding:12px;
    border:none;
    border-radius:12px;
    background:#2d73c5;
    color:#fff;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
}

.submit-btn:disabled{
    background:#aaa;
}

.success-message{
    display:none;
    margin-top:10px;
    background:#4caf50;
    color:#fff;
    padding:8px;
    border-radius:8px;
    text-align:center;
}

.success-message.show{display:block}

input[type="radio"]{display:none}
</style>
</head>

<body>

<div class="container">
<div class="card">

<form id="feedbackForm">

<h1>Share your feedback with us</h1>
<p class="subtext">We would love your feedback on our service</p>

<div class="rating-options">

<label class="rating-option">
<input type="radio" name="rating" value="good">
<span class="emoji">😊</span> Good
</label>

<label class="rating-option">
<input type="radio" name="rating" value="ok">
<span class="emoji">😐</span> Ok
</label>

<label class="rating-option">
<input type="radio" name="rating" value="poor">
<span class="emoji">😞</span> Poor
</label>

</div>

<label>What could we have done better?</label>
<textarea name="comment"></textarea>

<button type="submit" class="submit-btn" id="submitBtn">
Submit feedback
</button>

<div class="success-message" id="successMessage">
Submitted
</div>

</form>

</div>
</div>

<script>
let isSubmitted = false;

const form = document.getElementById('feedbackForm');
const options = document.querySelectorAll('.rating-option');
const submitBtn = document.getElementById('submitBtn');
const successMessage = document.getElementById('successMessage');

options.forEach(option=>{
    const input = option.querySelector('input');

    option.addEventListener('click', ()=>{
        if(isSubmitted) return;

        options.forEach(o=>o.classList.remove('selected'));
        option.classList.add('selected');
        input.checked = true;
    });
});

form.addEventListener('submit', function(e){
    e.preventDefault();

    if(isSubmitted) return;
    const sender = getUrlParameter('sender') || 'anonymous';
    const formData = new FormData(form);
    const rating = formData.get('rating');
    const comment = (formData.get('comment') || '').trim();

    if(!rating) return;

    isSubmitted = true;

    submitBtn.disabled = true;
    options.forEach(o=>o.style.pointerEvents = "none");

    window.parent.postMessage(
        JSON.stringify({
            event_code: "sendFeedbackToBot",
            data: { rating, comment,sender }
        }),
        "*"
    );

    successMessage.classList.add('show');

    setTimeout(()=>{
        window.parent.postMessage(
            JSON.stringify({ event_code: "close_webview" }),
            "*"
        );
    },800);
});
</script>

</body>
</html>
